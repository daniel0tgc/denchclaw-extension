name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build CLI
        run: pnpm build

      - name: Run unit tests
        run: pnpm vitest run --config vitest.unit.config.ts --pool=forks

      - name: Run bootstrap tests
        run: pnpm vitest run src/cli/bootstrap-external.test.ts src/cli/bootstrap-external.bootstrap-command.test.ts --pool=forks

      - name: Build web app (standalone)
        run: pnpm web:build
